apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "payment-service.fullname" . }}
  labels:
    {{- include "payment-service.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "payment-service.selectorLabels" . | nindent 6 }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1        # Allow 1 extra pod during rollout
      maxUnavailable: 0  # Never take a pod down before a new one is ready
  template:
    metadata:
      labels:
        {{- include "payment-service.selectorLabels" . | nindent 8 }}
      annotations:
        # Force pod restart when ConfigMap changes
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        prometheus.io/scrape: "true"
        prometheus.io/port:   "8000"
        prometheus.io/path:   "/metrics"
    spec:
      # Grace period: give in-flight requests time to complete before SIGKILL
      terminationGracePeriodSeconds: 30

      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}

      containers:
        - name: payment-service
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP

          # ── Security context ────────────────────────────────────────────────
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}

          # ── Environment from ConfigMap ──────────────────────────────────────
          envFrom:
            - configMapRef:
                name: {{ include "payment-service.fullname" . }}-config

          # ── Secrets as individual env vars ─────────────────────────────────
          env:
            {{- range $name, $ref := .Values.secretEnv }}
            - name: {{ $name }}
              valueFrom:
                secretKeyRef:
                  name: {{ $ref.secretName }}
                  key:  {{ $ref.secretKey }}
            {{- end }}

          # ── Resource requests & limits ──────────────────────────────────────
          resources:
            {{- toYaml .Values.resources | nindent 12 }}

          # ── Liveness probe — restart pod if unhealthy ───────────────────────
          livenessProbe:
            httpGet:
              path: {{ .Values.livenessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds }}
            periodSeconds:       {{ .Values.livenessProbe.periodSeconds }}
            failureThreshold:    {{ .Values.livenessProbe.failureThreshold }}

          # ── Readiness probe — remove from LB if not ready ──────────────────
          readinessProbe:
            httpGet:
              path: {{ .Values.readinessProbe.path }}
              port: http
            initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds }}
            periodSeconds:       {{ .Values.readinessProbe.periodSeconds }}
            failureThreshold:    {{ .Values.readinessProbe.failureThreshold }}

          # ── Writable temp dir (readOnlyRootFilesystem: true requires this) ──
          volumeMounts:
            - name: tmp
              mountPath: /tmp

      volumes:
        - name: tmp
          emptyDir: {}
